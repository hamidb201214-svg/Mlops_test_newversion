# QApp/docker-compose.yml
services:
  app:
    build: .
    container_name: qapp-app
    ports:
      - "8501:8501"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:1.7b
    depends_on:
      - ollama
 
  ollama:
    image: ollama/ollama
    container_name: qapp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
 
volumes:
  ollama_data:
